<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitHub Projects – jcbopit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-top: 80px;
      font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(ellipse at center, #001220 0%, #000000 100%);
      color: #ddfaff;
      line-height: 1.5;
      overflow-x: hidden;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 10, 30, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 4vw, 2.5rem);
      padding: 16px 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(102, 204, 255, 0.4);
      box-shadow: 0 0 14px rgba(51, 160, 255, 0.3);
      backdrop-filter: blur(6px);
      animation: glowPulse 4s infinite ease-in-out;
      flex-wrap: wrap;
    }

    #navbar a {
      color: #66ccff;
      text-decoration: none;
      font-size: clamp(0.9rem, 1vw + 0.5rem, 1.2rem);
      font-weight: 800;
      text-shadow: 0 0 5px #33bbff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
    }

    #navbar a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px #aaddff, 0 0 22px #66ccff;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 14px rgba(51, 160, 255, 0.3); }
      50% { box-shadow: 0 0 28px rgba(102, 220, 255, 0.75); }
    }

    h1, h2 {
      color: #aaddff;
      text-shadow: 0 0 6px rgba(102, 220, 255, 0.8);
      animation: flicker 2.5s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.95; text-shadow: 0 0 5px #88dfff; }
      25% { opacity: 1; text-shadow: 0 0 8px #aaddff; }
      50% { opacity: 0.92; text-shadow: 0 0 6px #66ccff; }
      75% { opacity: 0.98; text-shadow: 0 0 8px #99eeff; }
      100% { opacity: 1; text-shadow: 0 0 9px #bbf0ff; }
    }

    main {
      padding: 2rem;
      max-width: 920px;
      margin: 0 auto;
    }

    .profile-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .profile-section img {
      width: 130px;
      border-radius: 50%;
      border: 3px solid #66ccff;
      box-shadow: 0 0 15px #33bbff;
    }

    .profile-text {
      flex: 1 1 250px;
    }

    .profile-text h2 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw + 0.3rem, 1.6rem);
      color: #ccf0ff;
    }

    .profile-text p {
      margin: 0.4rem 0;
      color: #d7f9ff;
    }

    .repo-card {
      border: 1px solid #66ccff33;
      border-radius: 10px;
      padding: 1.3rem;
      background: rgba(0, 20, 40, 0.75);
      box-shadow: 0 2px 10px rgba(102, 204, 255, 0.2);
      margin-bottom: 1.7rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .repo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 20px rgba(102, 204, 255, 0.3);
    }

    .repo-card h3 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .repo-card a {
      text-decoration: none;
      color: #99ddff;
    }

    .repo-card p {
      margin: 0 0 0.8rem;
      color: #cfefff;
    }

    .repo-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.9rem;
      color: #b3e7ff;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    #contributions {
      margin: 3rem 0;
      text-align: center;
    }

    #contributions img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #66ccff44;
      filter: invert(0.9) hue-rotate(160deg) brightness(1.1);
      box-shadow: 0 0 10px rgba(102, 204, 255, 0.2);
    }

    @media (max-width: 600px) {
      main {
        padding: 1rem;
      }

      .profile-section {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .profile-text h2 {
        font-size: 1.3rem;
      }

      .repo-card {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <main>
    <section class="profile-section">
      <img id="profile-pic" src="" alt="GitHub Avatar" />
      <div class="profile-text">
        <h2 id="github-name">GitHub Profile</h2>
        <p id="github-bio">Loading bio...</p>
        <p>
          <strong id="repo-count">0</strong> repositories — 
          <strong id="followers">0</strong> followers
        </p>
        <a href="https://github.com/jcbopit" target="_blank" style="color: #99ddff;">Visit GitHub →</a>
      </div>
    </section>

    <h1>GitHub Projects</h1>
    <div id="repo-list">Loading repositories...</div>

    <div id="contributions">
      <h2>Contribution Activity</h2>
      <img src="https://ghchart.rshah.org/jcbopit" alt="GitHub Contribution Graph">
    </div>
  </main>

  <script>
    async function loadProfileAndRepos() {
      const username = "jcbopit";

      try {
        const res = await fetch(`https://api.github.com/users/${username}`);
        const user = await res.json();

        document.getElementById("profile-pic").src = user.avatar_url;
        document.getElementById("github-name").textContent = user.name || username;
        document.getElementById("github-bio").textContent = user.bio || "GitHub user";
        document.getElementById("repo-count").textContent = user.public_repos;
        document.getElementById("followers").textContent = user.followers;

        const repoRes = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
        const data = await repoRes.json();
        const container = document.getElementById("repo-list");
        container.innerHTML = "";

        const languageColors = {
          JavaScript: "#f1e05a",
          Python: "#3572A5",
          HTML: "#e34c26",
          CSS: "#563d7c",
          C: "#555555",
          "C++": "#f34b7d",
          Java: "#b07219",
          TypeScript: "#2b7489"
        };

        data.slice(0, 6).forEach(repo => {
          const lang = repo.language;
          const color = languageColors[lang] || "#ccc";

          const card = document.createElement("div");
          card.className = "repo-card";

          card.innerHTML = `
            <h3><a href="${repo.html_url}" target="_blank">${repo.name}</a></h3>
            <p>${repo.description || ""}</p>
            <div class="repo-meta">
              ${lang ? `<span><span class="dot" style="background:${color}"></span>${lang}</span>` : ""}
              <span>⭐ ${repo.stargazers_count}</span>
              <span>🍴 ${repo.forks_count}</span>
            </div>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        console.error("GitHub API error:", error);
        document.getElementById("repo-list").textContent = "Failed to load repositories.";
      }
    }

    window.onload = loadProfileAndRepos;
  </script>
</body>
</html>

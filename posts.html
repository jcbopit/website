<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Posts – jcbopit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-top: 80px;
      font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(ellipse at center, #001220 0%, #000000 100%);
      color: #ddfaff;
      line-height: 1.5;
      overflow-x: hidden;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 10, 30, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 4vw, 2.5rem);
      padding: 16px 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(102, 204, 255, 0.4);
      box-shadow: 0 0 14px rgba(51, 160, 255, 0.3);
      backdrop-filter: blur(6px);
      animation: glowPulse 4s infinite ease-in-out;
      flex-wrap: wrap;
    }

    #navbar a {
      color: #66ccff;
      text-decoration: none;
      font-size: clamp(0.9rem, 1vw + 0.5rem, 1.2rem);
      font-weight: 800;
      text-shadow: 0 0 5px #33bbff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
    }

    #navbar a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px #aaddff, 0 0 22px #66ccff;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 14px rgba(51, 160, 255, 0.3); }
      50% { box-shadow: 0 0 28px rgba(102, 220, 255, 0.75); }
    }

    main {
      padding: 2rem;
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      color: #aaddff;
      text-shadow: 0 0 6px rgba(102, 220, 255, 0.8);
      animation: flicker 2.5s infinite;
      margin-bottom: 1.8rem;
      font-size: clamp(1.5rem, 2vw + 1rem, 2rem);
    }

    @keyframes flicker {
      0% { opacity: 0.95; text-shadow: 0 0 5px #88dfff; }
      25% { opacity: 1; text-shadow: 0 0 8px #aaddff; }
      50% { opacity: 0.92; text-shadow: 0 0 6px #66ccff; }
      75% { opacity: 0.98; text-shadow: 0 0 8px #99eeff; }
      100% { opacity: 1; text-shadow: 0 0 9px #bbf0ff; }
    }

    p {
      color: #cfefff;
      font-size: clamp(1rem, 0.8rem + 0.5vw, 1.15rem);
    }

    @media (max-width: 600px) {
      main {
        padding: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <main>
    <h1>Posts</h1>
    <p>This is the posts page. Soon this will include writing, notes, and longer thoughts.</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curriculum Vitae – jcbopit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding-top: 60px;
      font-family: 'JetBrains Mono', monospace;
      background: #000;
      color: #e0ffe0;
      line-height: 1.5;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #050505;
      display: flex;
      justify-content: center;
      padding: 12px 0;
      z-index: 1000;
      border-bottom: 1px solid #00ff5a33;
      box-sizing: border-box;
    }

    #navbar a {
      color: #66ffb2;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    #navbar a:hover {
      color: #00ffff;
    }

    @media (max-width: 600px) {
      #navbar {
        justify-content: space-around;
        padding: 10px;
        overflow: hidden;
      }

      #navbar a {
        margin: 0 10px;
        font-size: clamp(0.75rem, 4vw, 0.9rem);
      }
    }

    main {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #66ffb2;
      margin-bottom: 1.5rem;
    }

    p {
      color: #b0ffcc;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: 2px solid #00ffcc22;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      iframe {
        height: 600px;
      }
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <main>
    <h1>Curriculum Vitae</h1>
    <iframe src="CV.pdf"></iframe>
  </main>
</body>
</html>

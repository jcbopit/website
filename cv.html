<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curriculum Vitae – jcbopit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding-top: 72px;
      font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(ellipse at center, #060606 0%, #000000 100%);
      color: #ffeccc;
      overflow-x: hidden;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 4vw, 2.5rem);
      padding: 14px 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(255, 80, 0, 0.4);
      box-shadow: 0 0 18px rgba(255, 60, 0, 0.4);
      backdrop-filter: blur(6px);
      animation: glowPulse 4s infinite ease-in-out;
      flex-wrap: wrap;
    }

    #navbar a {
      color: #ffaa66;
      text-decoration: none;
      font-size: clamp(0.85rem, 1vw + 0.6rem, 1.15rem);
      font-weight: 800;
      text-shadow: 0 0 6px #ff5500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
    }

    #navbar a:hover {
      color: #fff6cc;
      text-shadow: 0 0 10px #ffaa66, 0 0 20px #ff6600;
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow: 0 0 18px rgba(255, 50, 0, 0.3);
      }
      50% {
        box-shadow: 0 0 30px rgba(255, 130, 60, 0.8);
      }
    }

    main {
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
      color: #ffddbb;
      text-shadow: 0 0 3px #ff7733;
    }

    h1 {
      color: #ffae66;
      margin-bottom: 1.5rem;
      font-weight: 600;
      font-size: clamp(1.3rem, 2vw + 0.5rem, 2rem);
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 80vh;
      min-height: 500px;
      border: 2px solid #ffaa5522;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255, 100, 0, 0.3);
      background-color: #111;
    }

    @media (max-width: 600px) {
      main {
        padding: 1rem;
      }

      iframe {
        height: 70vh;
        min-height: 400px;
      }
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <main>
    <h1>Curriculum Vitae</h1>
    <iframe src="CV.pdf" title="CV PDF"></iframe>
  </main>
</body>
</html>

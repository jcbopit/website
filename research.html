<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research – jcbopit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-top: 80px;
      font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 100%);
      color: #ffeedd;
      line-height: 1.65;
      overflow-x: hidden;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 5, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(1rem, 4vw, 2.5rem);
      padding: 16px 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(255, 100, 50, 0.4);
      box-shadow: 0 0 14px rgba(255, 80, 30, 0.4);
      backdrop-filter: blur(6px);
      animation: glowPulse 4s infinite ease-in-out;
      flex-wrap: wrap;
    }

    #navbar a {
      color: #ffaa66;
      text-decoration: none;
      font-size: clamp(0.9rem, 1vw + 0.5rem, 1.2rem);
      font-weight: 800;
      text-shadow: 0 0 5px #ff5500;
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
    }

    #navbar a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px #ffaa66, 0 0 22px #ff6600;
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow: 0 0 14px rgba(255, 80, 30, 0.4);
      }
      50% {
        box-shadow: 0 0 28px rgba(255, 160, 80, 0.75);
      }
    }

    main {
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(1.5rem, 2vw + 1rem, 2.2rem);
      color: #ffbb66;
      margin-bottom: 1.4rem;
      text-shadow: 0 0 6px rgba(255, 140, 40, 0.8);
      animation: flicker 2.5s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.95; text-shadow: 0 0 5px #ff9933; }
      25% { opacity: 1; text-shadow: 0 0 8px #ffcc66; }
      50% { opacity: 0.92; text-shadow: 0 0 6px #ff7733; }
      75% { opacity: 0.98; text-shadow: 0 0 8px #ffaa55; }
      100% { opacity: 1; text-shadow: 0 0 9px #ffbb66; }
    }

    p {
      color: #ffd7aa;
      font-size: clamp(1rem, 0.9rem + 0.4vw, 1.1rem);
      margin-bottom: 1.3rem;
    }

    @media (max-width: 600px) {
      main {
        padding: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <main>
    <h1>Research</h1>
    <p>This is the research page. Content about my computational math, theoretical physics, and applied finance research will go here soon.</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epicycle Terminal</title>

  <!-- Fonts & KaTeX -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>

  <!-- p5.js -->
  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      background: #000;
      color: #00ffcc;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #050505;
      display: flex;
      justify-content: center;
      padding: 12px 0;
      z-index: 1000;
      border-bottom: 1px solid #00ff5a33;
      box-sizing: border-box;
    }

    #navbar a {
      color: #66ffb2;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    #navbar a:hover {
      color: #00ffff;
    }

    @media (max-width: 600px) {
      #navbar {
        justify-content: space-around;
        padding: 10px;
        overflow: hidden;
      }

      #navbar a {
        margin: 0 10px;
        font-size: clamp(0.75rem, 4vw, 0.9rem);
      }
    }

    #equation {
      position: absolute;
      top: 10vh;
      left: 2vw;
      font-size: 1rem;
      color: #00ffcc;
      z-index: 6;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #animation-dimmer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }

    #about-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: 10;
      box-sizing: border-box;
    }

    #about-overlay img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 1rem;
      border: 1px solid #00ffcc;
      opacity: 0.95;
    }

    #about-overlay p {
      max-width: 480px;
      font-size: 1.1rem;
      text-align: center;
      color: #b0ffcc;
      margin: 0;
      white-space: pre-wrap;
    }

    #typewriter::after {
      content: '|';
      animation: blink 1s infinite;
      color: #00ffcc;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #continue-btn {
      margin-top: 2rem;
      padding: 0.6rem 1.3rem;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      background-color: #00ffcc;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0;
      display: none;
      transition: opacity 1s ease;
    }

    #continue-btn:hover {
      background-color: #00bfa5;
    }

    @media (max-width: 600px) {
      #about-overlay img {
        width: 100px;
        margin-bottom: 0.75rem;
      }

      #about-overlay p {
        font-size: 0.95rem;
        padding: 0 16px;
        line-height: 1.4;
      }

      #continue-btn {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
        margin-top: 1.5rem;
      }
    }

    #metrics-panel {
      position: fixed;
      bottom: 10px;
      left: 12px;
      background: black;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #00ffcc;
      display: none;
      gap: 14px;
      z-index: 5;
      line-height: 1.2;
      pointer-events: none;
      box-shadow: 0 0 8px #00ffcc33;
    }

    .metric {
      display: flex;
      gap: 4px;
    }

    .value.positive {
      color: #00ff88;
      animation: pulseGreen 1s infinite alternate;
    }

    .value.negative {
      color: #ff4d4d;
      animation: pulseRed 1s infinite alternate;
    }

    @keyframes pulseGreen {
      0% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    @keyframes pulseRed {
      0% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    #spark {
      position: fixed;
      bottom: 38px;
      left: 12px;
      height: 25px;
      width: 300px;
      background: black;
      z-index: 4;
      pointer-events: none;
      display: none;
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <div id="equation"></div>
  <main id="animation"></main>
  <canvas id="spark"></canvas>

  <div id="metrics-panel">
    <div class="metric"><span class="label">R:</span><span id="metric-radius">--</span></div>
    <div class="metric"><span class="label">V:</span><span id="metric-velocity">--</span></div>
    <div class="metric"><span class="label">ΔV:</span><span id="metric-delta">--</span></div>
    <div class="metric"><span class="label">t:</span><span id="metric-t">--</span></div>
  </div>

  <div id="animation-dimmer"></div>

  <div id="about-overlay">
    <img src="1000017195 (2).png" alt="My Face" />
    <p id="typewriter"></p>
    <button id="continue-btn">Continue</button>
  </div>

  <script src="sketch.js"></script>
  <script>
    const fullText = `Hi, I’m Justin 
I’m a Sophomore at Indiana University studying Theoretical Physics and Pure Mathematics.
I grew up across Asia, living in Shanghai, Hong Kong, and Indonesia - having studied at international schools.
My goal is to pursue grad school for applied mathematics and transition into quantitative finance.
This website is a personal project to showcase my work and research.`;

    let currentChar = 0;
    const speed = 40;
    let audio = new Audio("typewriter-key.mp3");

    function typeWriter() {
      if (currentChar < fullText.length) {
        const char = fullText.charAt(currentChar);
        document.getElementById("typewriter").textContent += char;
        if (char !== "\n") audio.cloneNode().play();
        currentChar++;
        setTimeout(typeWriter, speed);
      } else {
        fadeInContinueButton();
      }
    }

    function fadeInContinueButton() {
      const btn = document.getElementById("continue-btn");
      btn.style.display = "inline-block";
      setTimeout(() => { btn.style.opacity = "1"; }, 50);
    }

    document.getElementById("continue-btn").addEventListener("click", () => {
      const overlay = document.getElementById("about-overlay");
      overlay.style.opacity = "0";
      overlay.style.pointerEvents = "none";
      document.getElementById("equation").style.opacity = "1";

      const metricsPanel = document.getElementById("metrics-panel");
      const spark = document.getElementById("spark");
      metricsPanel.style.display = "flex";
      spark.style.display = "block";

      setTimeout(() => {
        metricsPanel.style.opacity = "1";
        spark.style.opacity = "1";
      }, 100);
    });

    function showAboutOverlay() {
      const overlay = document.getElementById("about-overlay");
      overlay.style.opacity = "1";
      overlay.style.pointerEvents = "auto";
      document.getElementById("equation").style.opacity = "0";

      const typewriter = document.getElementById("typewriter");
      typewriter.textContent = "\u200B";
      document.getElementById("continue-btn").style.display = "none";
      currentChar = 0;

      setTimeout(() => {
        typewriter.textContent = "";
        typeWriter();
      }, 3000);
    }

    window.showAboutOverlay = showAboutOverlay;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epicycle Terminal</title>

  <!-- Fonts & KaTeX -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>

  <!-- p5.js -->
  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: 'JetBrains Mono', monospace;
      color: #fff5e6;
    }

    main#animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      background: rgba(20, 0, 0, 0.85);
      border-bottom: 2px solid #ff5e00;
      box-shadow: 0 0 20px #ff3c00, 0 0 60px #ff7a00;
      backdrop-filter: blur(6px);
      animation: navbarGlow 6s ease-in-out infinite;
    }

    #navbar a {
      color: #ffaa66;
      text-decoration: none;
      margin: 0 25px;
      font-size: 1.15rem;
      font-weight: 800;
      text-shadow: 0 0 6px #ff4d00, 0 0 12px #ff6600;
      transition: all 0.3s ease;
    }

    #navbar a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px #ffaa66, 0 0 25px #ff9900;
    }

    @keyframes navbarGlow {
      0%, 100% { box-shadow: 0 0 20px #ff3c00, 0 0 60px #ff7a00; }
      50% { box-shadow: 0 0 30px #ffa733, 0 0 90px #ff6600; }
    }

    #equation {
      position: absolute;
      top: 10vh;
      left: 2vw;
      font-size: 1.7rem;
      z-index: 5;
      opacity: 0;
      color: #fff8e0;
      text-shadow: 0 0 4px #ffbb66, 0 0 6px #ff6600;
      animation: flicker 2.5s infinite;
      transition: opacity 3s ease;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; text-shadow: 0 0 4px #ff9933; }
      50% { opacity: 0.85; text-shadow: 0 0 8px #ffcc66; }
    }

    #about-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(20, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      padding: 20px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }

    #about-overlay img {
      width: 140px;
      border-radius: 50%;
      border: 4px solid #ffaa44;
      box-shadow: 0 0 20px #ff8800;
      margin-bottom: 1rem;
    }

    #about-overlay p {
      color: #fff3e0;
      font-size: 1.1rem;
      max-width: 520px;
      text-align: center;
      white-space: pre-wrap;
      text-shadow: 0 0 6px #ffaa55;
    }

    #typewriter::after {
      content: '|';
      animation: blink 1.2s infinite;
      color: #ffcc99;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #continue-btn {
      margin-top: 2rem;
      padding: 0.7rem 1.5rem;
      font-size: 1rem;
      background-color: #ff5500;
      color: black;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      opacity: 0;
      display: none;
      transition: opacity 1s ease, background 0.3s ease;
    }

    #continue-btn:hover {
      background-color: #ffaa33;
    }
  </style>
</head>

<body>
  <div id="navbar">
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="github.html">GitHub</a>
    <a href="cv.html">CV</a>
    <a href="posts.html">Posts</a>
  </div>

  <div id="equation"></div>
  <main id="animation"></main>

  <div id="about-overlay">
    <img src="1000017195 (2).png" alt="My Face" />
    <p id="typewriter"></p>
    <button id="continue-btn">Continue</button>
  </div>

  <script src="sketch.js"></script>
  <script>
    const fullText = `Hi, I’m Justin 
I’m a Sophomore at Indiana University studying Theoretical Physics and Pure Mathematics.
I grew up across Asia, living in Shanghai, Hong Kong, and Indonesia - having studied at international schools.
My goal is to pursue grad school for applied mathematics and transition into quantitative finance.
This website is a personal project to showcase my work and research.`;

    let currentChar = 0;
    const speed = 40;
    let audio = new Audio("typewriter-key.mp3");

    function typeWriter() {
      if (currentChar < fullText.length) {
        const char = fullText.charAt(currentChar);
        document.getElementById("typewriter").textContent += char;
        if (char !== "\n") audio.cloneNode().play();
        currentChar++;
        setTimeout(typeWriter, speed);
      } else {
        fadeInContinueButton();
      }
    }

    function fadeInContinueButton() {
      const btn = document.getElementById("continue-btn");
      btn.style.display = "inline-block";
      setTimeout(() => { btn.style.opacity = "1"; }, 100);
    }

    document.getElementById("continue-btn").addEventListener("click", () => {
      document.getElementById("about-overlay").style.opacity = "0";
      document.getElementById("about-overlay").style.pointerEvents = "none";
      document.getElementById("equation").style.opacity = "1";
    });

    function showAboutOverlay() {
      const overlay = document.getElementById("about-overlay");
      overlay.style.opacity = "1";
      overlay.style.pointerEvents = "auto";
      document.getElementById("equation").style.opacity = "0";

      const typewriter = document.getElementById("typewriter");
      typewriter.textContent = "\u200B";
      document.getElementById("continue-btn").style.display = "none";
      currentChar = 0;

      setTimeout(() => {
        typewriter.textContent = "";
        typeWriter();
      }, 3000);
    }

    window.showAboutOverlay = showAboutOverlay;
  </script>
</body>
</html>
